    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Orbitron", sans-serif;
      }

      body {
        min-height: 140vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(
          circle at top,
          #1e3a8a,
          #0f172a 55%,
          #020617
        );

        color: white;
      }

      /* stars */
      body::before {
        content: "";
        position: absolute;
        width: 200%;

        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.08) 1px,
          transparent 1px
        );
        background-size: 40px 40px;
        animation: bgmove 18s linear infinite;
        opacity: 0.25;
      }

      @keyframes bgmove {
        0% {
          transform: translate(0, 0);
        }
        100% {
          transform: translate(-80px, -80px);
        }
      }

      .card {
        position: relative;
        z-index: 2;
        width: 60vw;
        max-width: 95%;
        padding: 2vw;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.07);
        backdrop-filter: blur(16px);
        box-shadow:
          0 0 25px rgba(56, 189, 248, 0.15),
          0 20px 45px rgba(0, 0, 0, 0.5);
        text-align: center;
      }

      h1 {
        font-size: 32px;
        margin-bottom: 10px;
        text-shadow: 0 0 10px #38bdf8;
      }

      .info {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }

      .pill {
        flex: 1;
        min-width: 120px;
        padding: 10px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.08);
        font-size: 14px;
      }

      canvas {
        display: block;
        margin: auto;
        background: rgba(255, 255, 255, 0.04);
        border: 2px solid rgba(56, 189, 248, 0.5);
        border-radius: 16px;
      }

      .buttons {
        margin-top: 10px;
        display: flex;
        gap: 8px;
        justify-content: center;
        flex-wrap: wrap;
      }

      button {
        padding: 10px 14px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 800;
        background: linear-gradient(135deg, #38bdf8, #0ea5e9);
        color: #00111a;
      }

      .mobile {
        margin-top: 8px;
        display: flex;
        justify-content: center;
        gap: 10px;
      }

      .mobbtn {
        padding: 10px 14px;
        border-radius: 10px;
        background: #0ea5e9;
        color: black;
        font-weight: 900;
        cursor: pointer;
      }

      #msg {
        margin-top: 8px;
        color: #7dd3fc;
        min-height: 20px;
      }

      /* popup */
      #popup {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 50px;
        font-weight: 900;
        background: rgba(0, 0, 0, 0.75);
        opacity: 0;
        pointer-events: none;
      }

      .show {
        animation: pop 1.2s ease;
      }

      @keyframes pop {
        0% {
          opacity: 0;
          transform: scale(0.6);
        }
        20% {
          opacity: 1;
          transform: scale(1.1);
        }
        80% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: scale(0.9);
        }
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>🐍 SNAKE PRO</h1>
      <p>Use Space key or Start button to play</p>
      <br />

      <div class="info">
        <div class="pill">LEVEL <span id="level">1</span>/10</div>
        <div class="pill">SCORE <span id="score">0</span></div>
        <div class="pill">BEST <span id="best">0</span></div>
      </div>

      <canvas id="game" width="420" height="420"></canvas>

      <div class="buttons">
        <button onclick="startGame()">START</button>
        <button onclick="restartGame()">RESTART</button>
      </div>

      <div class="mobile">
        <div class="mobbtn" onclick="moveDir('up')">⬆</div>
        <div class="mobbtn" onclick="moveDir('left')">⬅</div>
        <div class="mobbtn" onclick="moveDir('down')">⬇</div>
        <div class="mobbtn" onclick="moveDir('right')">➡</div>
      </div>

      <div id="msg">Eat food, grow, survive 🚀</div>
      <div id="popup"></div>
    </div>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      let level = 1,
        score = 0,
        target = 5;
      let tile = 20,
        count = 20;
      let snake = [],
        food = {},
        dir = { x: 1, y: 0 };
      let speed = 150,
        loop;
      let particles = [];

      /* HIGH SCORE */
      let best = localStorage.getItem("snakeBest") || 0;
      document.getElementById("best").innerText = best;

      /* SOUND */
      function beep(freq) {
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        osc.connect(gain);
        gain.connect(audio.destination);
        osc.frequency.value = freq;
        osc.start();
        osc.stop(audio.currentTime + 0.08);
      }

      /* POPUP */
      function popup(text) {
        let p = document.getElementById("popup");
        p.innerText = text;
        p.classList.remove("show");
        void p.offsetWidth;
        p.classList.add("show");
      }

      /* LEVEL SETUP */
      function setup() {
        count = 20 + (level - 1) * 2;
        tile = Math.floor(420 / count);
        speed = Math.max(50, 150 - level * 12);

        snake = [];
        for (let i = 4 + level; i > 0; i--) {
          snake.push({ x: i, y: 10 });
        }

        dir = { x: 1, y: 0 };
        score = 0;
        target = 4 + level;
        spawnFood();

        document.getElementById("level").innerText = level;
        document.getElementById("score").innerText = score;

        popup("LEVEL " + level);
      }

      /* FOOD */
      function spawnFood() {
        food = {
          x: Math.floor(Math.random() * count),
          y: Math.floor(Math.random() * count),
        };
      }

      /* PARTICLES */
      function addParticles(x, y) {
        for (let i = 0; i < 10; i++) {
          particles.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 3,
            vy: (Math.random() - 0.5) * 3,
            life: 20,
          });
        }
        beep(600);
      }

      /* DRAW */
      function draw() {
        ctx.clearRect(0, 0, 420, 420);

        /* food glow */
        ctx.fillStyle = "#f43f5e";
        ctx.beginPath();
        ctx.arc(
          food.x * tile + tile / 2,
          food.y * tile + tile / 2,
          tile / 2.5,
          0,
          6.28,
        );
        ctx.fill();

        /* snake */
        snake.forEach((s, i) => {
          ctx.fillStyle = i === 0 ? "#38bdf8" : "#0ea5e9";
          ctx.beginPath();
          ctx.roundRect(s.x * tile, s.y * tile, tile - 1, tile - 1, 6);
          ctx.fill();

          /* eyes */
          if (i === 0) {
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(s.x * tile + 6, s.y * tile + 6, 2, 0, 6.28);
            ctx.arc(s.x * tile + 14, s.y * tile + 6, 2, 0, 6.28);
            ctx.fill();
          }
        });

        /* particles */
        particles.forEach((p, i) => {
          ctx.fillStyle = "rgba(56,189,248,.9)";
          ctx.fillRect(p.x, p.y, 2, 2);
          p.x += p.vx;
          p.y += p.vy;
          p.life--;
          if (p.life <= 0) particles.splice(i, 1);
        });
      }

      /* UPDATE */
      function update() {
        let head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

        if (head.x < 0 || head.y < 0 || head.x >= count || head.y >= count) {
          gameOver();
          return;
        }

        for (let s of snake) {
          if (s.x === head.x && s.y === head.y) {
            gameOver();
            return;
          }
        }

        snake.unshift(head);

        /* eat */
        if (head.x === food.x && head.y === food.y) {
          score++;
          document.getElementById("score").innerText = score;

          addParticles(head.x * tile, head.y * tile);

          if (score > best) {
            best = score;
            localStorage.setItem("snakeBest", best);
            document.getElementById("best").innerText = best;
          }

          beep(800);
          spawnFood();

          if (score >= target) {
            nextLevel();
            return;
          }
        } else {
          snake.pop();
        }

        draw();
      }
      function focusGameScreen() {
        window.scrollTo(0, 140);
        document.body.style.overflow = "hidden";
      }

      function releaseGameScreen() {
        document.body.style.overflow = "auto";
      }

      /* LOOP */
      function startGame() {
        focusGameScreen();
        clearInterval(loop);
        level = 1;
        setup();
        draw();
        loop = setInterval(update, speed);
      }

      function restartGame() {
        startGame();
      }

      function nextLevel() {
        clearInterval(loop);

        if (level === 10) {
          popup("YOU WIN 🏆");
          beep(1000);
          return;
        }

        level++;
        popup("LEVEL UP!");
        beep(900);

        setTimeout(() => {
          setup();
          loop = setInterval(update, speed);
        }, 1000);
      }

      function gameOver() {
        releaseGameScreen();
        clearInterval(loop);
        popup("GAME OVER");
        beep(200);
      }

      document.addEventListener("keydown", (e) => {
        if (e.code === "Space") {
          startGame();
        }

        if (e.key === "ArrowUp" && dir.y !== 1) dir = { x: 0, y: -1 };
        if (e.key === "ArrowDown" && dir.y !== -1) dir = { x: 0, y: 1 };
        if (e.key === "ArrowLeft" && dir.x !== 1) dir = { x: -1, y: 0 };
        if (e.key === "ArrowRight" && dir.x !== -1) dir = { x: 1, y: 0 };
      });

      /* MOBILE */
      function moveDir(d) {
        if (d === "up" && dir.y !== 1) dir = { x: 0, y: -1 };
        if (d === "down" && dir.y !== -1) dir = { x: 0, y: 1 };
        if (d === "left" && dir.x !== 1) dir = { x: -1, y: 0 };
        if (d === "right" && dir.x !== -1) dir = { x: 1, y: 0 };
      }

      draw();
    </script>
  </body>
</html>
