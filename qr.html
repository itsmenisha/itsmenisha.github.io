<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="Generate a QR code for Nepali bank accounts instantly."
    />

    <title>Nisha QR Generator</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .pro-page123 {
        font-family: Inter, sans-serif;
        color: #f8fafc;
        line-height: 1.6;

        background:
          radial-gradient(
            circle at left center,
            rgba(34, 197, 94, 0.22),
            transparent 42%
          ),
          radial-gradient(
            circle at right center,
            rgba(56, 189, 248, 0.2),
            transparent 42%
          ),
          radial-gradient(circle at center, #050505, #020617, #01030a);
        background-attachment: fixed;
      }

      .wrap123 {
        max-width: 1180px;
        margin: auto;
        padding: 0 24px;
      }

      .hero1234 {
        padding: 90px 0 30px;
      }

      .mono {
        font-family: "JetBrains Mono", monospace;
        color: #38bdf8;
      }

      .hero1234 h1 {
        font-size: 56px;
        margin-top: 10px;
      }

      .sub {
        color: #94a3b8;
        font-size: 20px;
        max-width: 700px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 24px;
        padding: 30px 0 80px;
      }

      .card12345 {
        background: #0f172a;
        border: 1px solid #1e293b;
        border-radius: 24px;
        padding: 28px;
      }

      h3 {
        margin-bottom: 12px;
      }

      p {
        color: #94a3b8;
      }

      label {
        display: block;
        margin-top: 15px;
        margin-bottom: 6px;
      }

      input,
      select {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        background: #111827;
        border: 1px solid #334155;
        color: white;
      }

      input:focus,
      select:focus {
        border-color: #38bdf8;
      }

      .btn {
        width: 100%;
        margin-top: 20px;
        padding: 14px;
        border-radius: 12px;
        border: none;
        background: #38bdf8;
        font-weight: 800;
        cursor: pointer;
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      #qrCodeContainer {
        text-align: center;
        margin-top: 20px;
      }

      #qrCodeContainer img {
        max-width: 260px;
        background: white;
        padding: 12px;
        border-radius: 16px;
      }

      .download-btn {
        display: inline-block;
        margin-top: 15px;
        padding: 12px 16px;
        background: #22c55e;
        color: black;
        border-radius: 12px;
        font-weight: 800;
      }

      .side-image {
        width: 100%;
        border-radius: 18px;
        margin-top: 15px;
      }

      .footer {
        text-align: center;
        padding: 50px;
        color: #94a3b8;
      }
      .footer a {
        text-decoration: none;
        text-align: center;

        color: #94a3b8;
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .hero h1 {
          font-size: 38px;
        }
      }
    </style>
  </head>

  <body>
     <body class="pro-page123">
    <script src="js/loadhtml.js"></script>
    <div id="navbar-placeholder"></div>
    <script>
      loadHTML("navbar-placeholder", "navbar.html");
      loadHTML("footer-holder", "footer.html");
    </script>

    <div class="wrap123">
      <section class="hero1234">
        <div class="mono1234">payment.generate()</div>
        <h1>Bank QR Code Generator</h1>
        <p class="sub">
          Generate instant QR codes for Nepali bank accounts and download them.
        </p>
      </section>

      <section class="grid">
        <!-- FORM -->
        <div class="card12345">
          <h3>Create QR</h3>
          <p>Fill details and generate QR instantly</p>

          <form id="qrForm">
            <label>Name</label>
            <input type="text" id="name" required />

            <label>Bank</label>
            <select id="bank" name="bank" required>
              <option value="" disabled selected>— Choose your bank —</option>
              <option value="ADBLNPKA">
                Agricultural Development Bank (ADBL)
              </option>
              <option value="CTZNNPKA">Citizens Bank International</option>
              <option value="EVBLNPKA">Everest Bank</option>
              <option value="GLBBNPKA">Global IME Bank</option>
              <option value="HIMANPKA">Himalayan Bank</option>
              <option value="KMBLNPKA">Kumari Bank</option>
              <option value="LXBLNPKA">Laxmi Sunrise Bank</option>
              <option value="MBLNNPKA">Machhapuchchhre Bank</option>
              <option value="NARBNPKA">Nabil Bank</option>
              <option value="NEBLNPKA">Nepal Bank Limited</option>
              <option value="NINFNPKA">Nepal Infrastructure Bank</option>
              <option value="NIBLNPKT">Nepal Investment Mega Bank</option>
              <option value="NRBLNPKA">Nepal Rastra Bank</option>
              <option value="NSBINPKA">Nepal SBI Bank</option>
              <option value="BOALNPKA">NIC Asia Bank</option>
              <option value="NMBBNPKA">NMB Bank</option>
              <option value="PRVUNPKA">Prabhu Bank</option>
              <option value="PCBLNPKA">Prime Commercial Bank</option>
              <option value="RBBANPKA">Rastriya Banijya Bank</option>
              <option value="SNMANPKA">Sanima Bank</option>
              <option value="SIDDNPKA">Siddhartha Bank</option>
              <option value="SCBLNPKA">Standard Chartered Bank Nepal</option>
              <option value="SRDBNPKA">Shine Resunga Development Bank</option>
            </select>

            <label>Account Number</label>
            <input type="text" id="accountNumber" required />

            <button class="btn" type="submit">Generate QR</button>
          </form>
        </div>

        <!-- INFO + IMAGE REPLACED BY QR -->
        <div class="card12345">
          <h3>Preview</h3>
          <p>Your QR will appear below this section</p>

          <!-- default image -->
          <img src="images/qr.jpg" class="side-image" id="defaultImg" />

          <!-- QR replaces here -->
          <div id="qrCodeContainer"></div>
        </div>
      </section>
    </div>

    <div class="footer">
      © 2026 Nisha Kiran Gnawaly <br />

      gnawalynishakiran@gmail.com

      <a
        href="https://mail.google.com/mail/u/0/#sent?compose=new"
        class="link-box"
        target="_blank"
      >
        <button
          onclick="navigator.clipboard.writeText('gnawalynishakiran@gmail.com')"
          style="font-size: 1.5vw"
        >
          📋
        </button>
      </a>
      <br />
      <a class="link-box" target="_blank" href="index.html">Back To Home</a>
    </div>

    <script>
      document
        .getElementById("qrForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const name = document.getElementById("name").value;
          const bank = document.getElementById("bank").value;
          const accountNumber = document.getElementById("accountNumber").value;

          const data = {
            accountNumber,
            accountName: name,
            bankCode: bank,
          };

          QRCode.toDataURL(JSON.stringify(data), function (err, url) {
            if (err) return;

            // hide image
            document.getElementById("defaultImg").style.display = "none";

            // show QR
            document.getElementById("qrCodeContainer").innerHTML = `
            <img src="${url}" />
            <br>
            <a class="download-btn" href="${url}" download="${bank}_${name}.png">
              Download QR
            </a>
          `;
          });
        });
    </script>
  </body>
</html>
